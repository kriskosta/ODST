# ====================
# BUILD STAGE
# ====================
build:
  stage: build
  needs: ["install"]
  script:
    - npm run build
    - echo "Build completed successfully"
    - ls -la dist/
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  only:
    - main
    - develop
    - /^feature\/.*/
    - /^ai\/.*/
    - merge_requests

# ====================
# DEPLOY STAGE
# ====================

# Deploy to local server (for latest build preview)
# Prerequisites:
#   1. Directory /var/www/monarch must exist and be writable by gitlab-runner user
#   2. nginx or another web server must be configured to serve /var/www/monarch on port 4173
# To set up:
#   sudo mkdir -p /var/www/monarch
#   sudo chown gitlab-runner:gitlab-runner /var/www/monarch
#   Configure nginx to serve the directory (see docs/DEPLOYMENT.md)
deploy-preview:
  stage: deploy
  needs: ["build"]
  script:
    - |
      # Verify deployment directory exists and is writable
      if [ ! -d "/var/www/monarch" ]; then
        echo "ERROR: /var/www/monarch directory does not exist"
        echo "Please create it with: sudo mkdir -p /var/www/monarch && sudo chown gitlab-runner:gitlab-runner /var/www/monarch"
        exit 1
      fi
      if [ ! -w "/var/www/monarch" ]; then
        echo "ERROR: /var/www/monarch is not writable by gitlab-runner"
        echo "Please fix with: sudo chown gitlab-runner:gitlab-runner /var/www/monarch"
        exit 1
      fi
    - rsync -av --delete dist/ /var/www/monarch/
    - 'echo "Deployed at $(date)" > /var/www/monarch/.deployed'
    - 'echo "Commit: ${CI_COMMIT_SHA}" >> /var/www/monarch/.deployed'
    - 'echo "Branch: ${CI_COMMIT_REF_NAME}" >> /var/www/monarch/.deployed'
    - echo "Site deployed to /var/www/monarch - ensure nginx is serving on port 4173"
  environment:
    name: preview
    url: http://192.168.0.20:4173
  only:
    - main
    - develop
    - /^feature\/.*/
    - /^ai\/.*/

# Production deployment (manual trigger)
deploy-production:
  stage: deploy
  needs: ["build"]
  script:
    - rsync -av --delete dist/ /var/www/monarch/
    - 'echo "Production deployment at $(date)" > /var/www/monarch/.deployed'
    - 'echo "Commit: ${CI_COMMIT_SHA}" >> /var/www/monarch/.deployed'
  environment:
    name: production
    url: http://192.168.0.20:4173
  when: manual
  only:
    - main

# ====================
# REVIEW ENVIRONMENTS
# ====================

# Create review environment for merge requests
review:
  stage: deploy
  needs: ["build"]
  script:
    - echo "Creating review environment..."
    - 'echo "Review for MR !${CI_MERGE_REQUEST_IID}" > dist/.review'
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  environment:
    name: review/${CI_COMMIT_REF_SLUG}
    url: http://localhost:4173/review/${CI_COMMIT_REF_SLUG}
    on_stop: stop-review
  only:
    - merge_requests

stop-review:
  stage: deploy
  script:
    - echo "Stopping review environment..."
  environment:
    name: review/${CI_COMMIT_REF_SLUG}
    action: stop
  when: manual
  only:
    - merge_requests

# ====================
# PAGES (GitLab Pages for public access if needed)
# ====================
pages:
  stage: deploy
  needs: ["build"]
  script:
    - mkdir -p public
    - cp -r dist/* public/
  artifacts:
    paths:
      - public/
    expire_in: 1 month
  only:
    - main
  when: manual
