# Monarch Website CI/CD Pipeline
# Fully testable CI/CD that updates a locally hosted site for the most recent build

image: node:20

# Cache node_modules to speed up builds
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .npm/

# Define stages
# Note: lint and test stages temporarily disabled for faster deployment
stages:
  - install
  # - lint      # Temporarily disabled
  # - test      # Temporarily disabled
  - build
  - deploy

# Global variables
variables:
  NPM_CONFIG_CACHE: "${CI_PROJECT_DIR}/.npm"
  PLAYWRIGHT_BROWSERS_PATH: "${CI_PROJECT_DIR}/.playwright"

# ====================
# INSTALL STAGE
# ====================
install:
  stage: install
  script:
    - npm install
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour
  only:
    - main
    - develop
    - /^feature\/.*/
    - /^ai\/.*/
    - merge_requests

